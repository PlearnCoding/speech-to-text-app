<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech to Text Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex justify-center items-center p-2 sm:p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col h-[95vh] sm:h-auto sm:min-h-[800px]">
        
        <!-- Header -->
        <header class="gradient-bg text-white p-6 rounded-b-3xl shadow-md z-10">
            <h1 class="text-2xl font-bold text-center"><i class="fas fa-microphone-alt mr-2"></i>Speech to Text Pro</h1>
        </header>

        <!-- Content -->
        <main class="flex-grow p-5 flex flex-col gap-4 overflow-y-auto">
            
            <!-- ตั้งค่า API -->
            <div class="bg-indigo-50 border border-indigo-100 p-3 rounded-xl shadow-sm">
                <label class="block text-xs font-bold text-indigo-800 uppercase mb-1">
                    <i class="fas fa-link"></i> เชื่อมต่อ Google Sheet (Web App URL)
                </label>
                <input type="text" id="apiUrlInput" placeholder="วางลิงก์ /exec ที่นี่..." class="w-full text-sm p-2 rounded-lg border border-indigo-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <p class="text-[10px] text-indigo-500 mt-1">* ระบบจะจดจำลิงก์นี้ไว้ในเครื่องของคุณ</p>
            </div>

            <!-- Language Select -->
            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-500 uppercase ml-1">เลือกภาษา</label>
                <select id="langSelect" class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="th-TH">ภาษาไทย (Thai)</option>
                    <option value="en-US">English (US)</option>
                    <option value="ja-JP">日本語 (Japanese)</option>
                    <option value="zh-CN">中文 (Chinese)</option>
                </select>
            </div>

            <!-- Text Area -->
            <div class="flex-grow flex flex-col bg-white rounded-xl border border-gray-200 shadow-inner relative">
                <div class="flex justify-between items-center p-3 border-b border-gray-100 bg-gray-50 rounded-t-xl">
                    <span id="statusIndicator" class="text-xs font-bold text-gray-500 flex items-center gap-2">
                        <i id="statusIcon" class="fas fa-circle text-gray-300"></i>
                        <span id="statusText">รอการใช้งาน</span>
                    </span>
                    <button id="clearBtn" class="text-xs text-red-500 hover:text-red-700 font-bold px-2 py-1 bg-red-50 rounded-lg">
                        <i class="fas fa-trash"></i> ล้าง
                    </button>
                </div>
                
                <textarea id="finalText" class="flex-grow w-full p-3 text-gray-700 text-lg resize-none focus:outline-none bg-transparent" placeholder="ข้อความที่แปลงสำเร็จจะแสดงที่นี่..."></textarea>
                
                <div id="interimText" class="p-3 text-indigo-400 italic text-sm min-h-[3rem] bg-indigo-50/50 rounded-b-xl border-t border-gray-100"></div>
            </div>
        </main>

        <!-- Controls -->
        <footer class="p-5 bg-white border-t border-gray-100 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
            <div class="flex gap-3">
                <button id="recordBtn" class="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-md transition-all flex items-center justify-center gap-2 active:scale-95">
                    <i id="recordIcon" class="fas fa-microphone text-xl"></i>
                    <span id="recordText" class="text-lg">เริ่มพูด</span>
                </button>
                <button id="saveBtn" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-md transition-all flex items-center justify-center gap-2 active:scale-95">
                    <i class="fas fa-save text-xl"></i>
                    <span class="text-lg">บันทึก</span>
                </button>
            </div>
        </footer>
    </div>

    <!-- Script Logic -->
    <script>
        const DOM = {
            apiUrl: document.getElementById('apiUrlInput'),
            lang: document.getElementById('langSelect'),
            finalText: document.getElementById('finalText'),
            interimText: document.getElementById('interimText'),
            recordBtn: document.getElementById('recordBtn'),
            recordIcon: document.getElementById('recordIcon'),
            recordText: document.getElementById('recordText'),
            statusIcon: document.getElementById('statusIcon'),
            statusText: document.getElementById('statusText'),
            clearBtn: document.getElementById('clearBtn'),
            saveBtn: document.getElementById('saveBtn')
        };

        // โหลด API URL ที่เคยบันทึกไว้
        window.onload = () => {
            const savedUrl = localStorage.getItem('gasApiUrl');
            if (savedUrl) DOM.apiUrl.value = savedUrl;
        };

        // บันทึก API URL เมื่อมีการพิมพ์
        DOM.apiUrl.addEventListener('input', (e) => {
            localStorage.setItem('gasApiUrl', e.target.value);
        });

        let recognition = null;
        let isRecording = false;

        function initRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("เบราว์เซอร์ไม่รองรับการแปลงเสียง กรุณาใช้ Chrome หรือ Safari");
                return null;
            }

            const rec = new SpeechRecognition();
            rec.continuous = true;
            rec.interimResults = true;

            rec.onstart = () => {
                isRecording = true;
                updateUI(true);
            };

            rec.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        DOM.finalText.value += event.results[i][0].transcript + ' ';
                        DOM.finalText.scrollTop = DOM.finalText.scrollHeight;
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                DOM.interimText.innerText = interim;
            };

            rec.onerror = (event) => {
                console.error("Speech Error:", event.error);
                isRecording = false;
                updateUI(false);
                if (event.error === 'not-allowed') {
                    alert("กรุณาอนุญาตการเข้าถึงไมโครโฟนในเบราว์เซอร์ของคุณ");
                }
            };

            rec.onend = () => {
                if (isRecording) {
                    try { rec.start(); } catch(e) {}
                } else {
                    updateUI(false);
                }
            };

            return rec;
        }

        function updateUI(isListening) {
            if (isListening) {
                DOM.recordBtn.className = "flex-[2] bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-2xl shadow-md transition-all flex items-center justify-center gap-2 active:scale-95";
                DOM.recordIcon.className = "fas fa-stop text-xl animate-pulse";
                DOM.recordText.innerText = "หยุดพูด";
                DOM.statusIcon.className = "fas fa-circle text-red-500 animate-pulse";
                DOM.statusText.innerText = "กำลังฟัง...";
                DOM.statusText.className = "text-red-500 font-bold";
            } else {
                DOM.recordBtn.className = "flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-md transition-all flex items-center justify-center gap-2 active:scale-95";
                DOM.recordIcon.className = "fas fa-microphone text-xl";
                DOM.recordText.innerText = "เริ่มพูด";
                DOM.statusIcon.className = "fas fa-circle text-gray-300";
                DOM.statusText.innerText = "หยุดชั่วคราว";
                DOM.statusText.className = "text-gray-500";
                DOM.interimText.innerText = "";
            }
        }

        DOM.recordBtn.addEventListener('click', () => {
            if (!recognition) recognition = initRecognition();
            if (!recognition) return;

            if (isRecording) {
                isRecording = false;
                recognition.stop();
            } else {
                recognition.lang = DOM.lang.value;
                try {
                    recognition.start();
                } catch(e) {
                    recognition = initRecognition();
                    recognition.lang = DOM.lang.value;
                    recognition.start();
                }
            }
        });

        DOM.clearBtn.addEventListener('click', () => {
            if(confirm('ต้องการล้างข้อความทั้งหมดหรือไม่?')) {
                DOM.finalText.value = '';
                DOM.interimText.innerText = '';
            }
        });

        DOM.saveBtn.addEventListener('click', () => {
            const apiUrl = DOM.apiUrl.value.trim();
            const textToSave = DOM.finalText.value.trim();
            const langText = DOM.lang.options[DOM.lang.selectedIndex].text;

            if (!textToSave) return alert("ไม่มีข้อความให้บันทึกครับ");
            if (!apiUrl) return alert("กรุณาใส่ Web App URL เพื่อเชื่อมต่อระบบบันทึก");

            if(isRecording) {
                isRecording = false;
                recognition.stop();
            }

            const oldText = DOM.saveBtn.innerHTML;
            DOM.saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังส่ง...';
            DOM.saveBtn.disabled = true;

            // ส่งข้อมูลผ่าน API (Fetch) ไปที่ Google Apps Script
            fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // ใช้ text/plain เลี่ยงปัญหา CORS
                body: JSON.stringify({ text: textToSave, lang: langText })
            })
            .then(response => response.json())
            .then(data => {
                DOM.saveBtn.innerHTML = oldText;
                DOM.saveBtn.disabled = false;
                if(data.success) {
                    alert("✅ บันทึกลง Sheet สำเร็จ! กำลังโหลดไฟล์ .txt");
                    downloadTxt(textToSave);
                } else {
                    alert("❌ ข้อผิดพลาดจากฝั่งเซิร์ฟเวอร์: " + data.message);
                }
            })
            .catch(error => {
                DOM.saveBtn.innerHTML = oldText;
                DOM.saveBtn.disabled = false;
                alert("❌ การเชื่อมต่อล้มเหลว ตรวจสอบ URL ให้ถูกต้อง (ต้องลงท้ายด้วย /exec)");
                console.error(error);
            });
        });

        function downloadTxt(text) {
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Speech_${new Date().getTime()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
