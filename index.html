<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech to Text Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .modal-enter { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col items-center p-0 sm:p-4 w-full overflow-x-hidden">

    <!-- App Container -->
    <div class="max-w-2xl w-full flex flex-col gap-4 pb-10">
        
        <!-- Main Content -->
        <main class="flex flex-col bg-white sm:rounded-3xl shadow-lg sm:border border-gray-200 overflow-hidden relative h-[90vh] sm:h-[85vh] shrink-0 w-full">
            
            <header class="gradient-bg text-white p-3 shadow-md z-10 shrink-0 flex items-center justify-between px-4">
                <h1 class="text-sm font-bold flex items-center gap-2">
                    <i class="fas fa-podcast text-red-400 animate-pulse hidden" id="liveIcon"></i>
                    Meeting Recorder Pro
                </h1>
                <div class="flex items-center gap-3">
                    <div id="confidenceIndicator" class="text-[10px] bg-white/20 px-2 py-0.5 rounded-full uppercase">Ready</div>
                    <button id="settingsBtn" class="text-white/80 hover:text-white transition-colors">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </header>
            
            <!-- Tools Bar -->
            <div class="flex justify-between items-center p-2 border-b border-gray-100 bg-gray-50 shrink-0">
                <div class="flex items-center gap-1.5">
                    <select id="langSelect" class="bg-white border border-gray-200 text-gray-700 text-[11px] rounded-lg py-1 px-2 focus:ring-1 focus:ring-indigo-500 outline-none">
                        <option value="th-TH">ภาษาไทย (TH)</option>
                        <option value="en-US">English (US)</option>
                        <option value="ja-JP">日本語 (JP)</option>
                        <option value="zh-CN">中文 (CN)</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button id="clearBtn" class="text-[11px] text-red-500 font-bold px-3 py-1.5 hover:bg-red-50 rounded-lg transition-all">
                        <i class="fas fa-trash-alt"></i> ล้างข้อมูล
                    </button>
                </div>
            </div>
            
            <!-- Textarea (Full Width & Editable) -->
            <textarea id="finalText" class="flex-grow w-full p-5 text-gray-800 text-lg overflow-y-auto whitespace-pre-wrap leading-relaxed resize-none focus:outline-none bg-transparent" placeholder="ระบบกำลังรอรับเสียงหรือไฟล์เสียง..."></textarea>
            
            <!-- Interim Text -->
            <div id="interimText" class="px-5 py-3 text-indigo-500 font-medium italic text-sm min-h-[3rem] bg-indigo-50/30 border-t border-gray-50 shrink-0 flex items-center"></div>
            
            <!-- Main Controls -->
            <div class="p-3 bg-white border-t border-gray-100 flex flex-col gap-2 shrink-0">
                <div class="flex gap-2">
                    <button id="recordBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-2xl shadow-md transition-all flex items-center justify-center gap-2 active:scale-95 text-xs">
                        <i id="recordIcon" class="fas fa-microphone"></i>
                        <span id="recordText">เริ่มบันทึกสด</span>
                    </button>
                    <button id="uploadBtn" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3.5 rounded-2xl shadow-md transition-all flex items-center justify-center gap-2 active:scale-95 text-xs">
                        <i class="fas fa-file-audio"></i>
                        <span>โหลดไฟล์เสียง</span>
                    </button>
                    <input type="file" id="audioFile" accept="audio/*" class="hidden">
                </div>
                <button id="saveBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-2xl shadow-md transition-all flex items-center justify-center gap-2 active:scale-95 text-xs">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>ส่งเข้า Google Sheet</span>
                </button>
            </div>
        </main>

        <!-- Translation Card -->
        <div class="flex flex-col bg-white sm:rounded-3xl shadow-lg border-t border-gray-200 overflow-hidden min-h-[450px] shrink-0 w-full mb-10">
            <div class="flex justify-between items-center p-4 border-b border-gray-100 bg-amber-50 shrink-0">
                <div class="flex items-center gap-3 w-full max-w-[70%]">
                    <div class="bg-amber-100 p-2 rounded-lg text-amber-600">
                        <i class="fas fa-language text-xl"></i>
                    </div>
                    <select id="translateLangSelect" class="w-full bg-white border border-amber-200 text-gray-700 text-sm rounded-xl py-2 px-3 focus:ring-2 focus:ring-amber-500 outline-none font-medium">
                        <option value="en">แปลเป็น: English</option>
                        <option value="th">แปลเป็น: ภาษาไทย</option>
                        <option value="ja">แปลเป็น: Japanese</option>
                        <option value="zh-CN">แปลเป็น: Chinese</option>
                    </select>
                </div>
                <button id="translateBtn" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 px-6 rounded-xl shadow-lg transition-all active:scale-95 flex items-center gap-2 text-sm">
                    <i class="fas fa-bolt"></i> แปลภาษา
                </button>
            </div>
            <div id="translateResult" class="flex-grow p-6 text-gray-800 text-lg overflow-y-auto whitespace-pre-wrap leading-relaxed bg-amber-50/10" placeholder="ผลการแปลจะแสดงที่นี่..."></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl modal-enter">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">ตั้งค่าระบบ</h2>
                <button id="closeSettings" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1 ml-1">Google Apps Script URL</label>
                    <input type="password" id="gasUrlInput" placeholder="https://script.google.com/macros/s/.../exec" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1 ml-1">Gemini API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <p class="text-[10px] text-gray-400 italic">* ข้อมูลจะถูกเก็บไว้ในเบราว์เซอร์ของคุณเท่านั้น ไม่มีการส่งไปที่อื่น</p>
                
                <button id="saveSettings" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-all shadow-md">บันทึกการตั้งค่า</button>
            </div>
        </div>
    </div>

    <script>
        const DOM = {
            lang: document.getElementById('langSelect'),
            finalText: document.getElementById('finalText'),
            interimText: document.getElementById('interimText'),
            recordBtn: document.getElementById('recordBtn'),
            recordIcon: document.getElementById('recordIcon'),
            recordText: document.getElementById('recordText'),
            liveIcon: document.getElementById('liveIcon'),
            clearBtn: document.getElementById('clearBtn'),
            saveBtn: document.getElementById('saveBtn'),
            uploadBtn: document.getElementById('uploadBtn'),
            fileInput: document.getElementById('audioFile'),
            confidence: document.getElementById('confidenceIndicator'),
            translateLang: document.getElementById('translateLangSelect'),
            translateBtn: document.getElementById('translateBtn'),
            translateResult: document.getElementById('translateResult'),
            
            // Settings
            settingsBtn: document.getElementById('settingsBtn'),
            settingsModal: document.getElementById('settingsModal'),
            closeSettings: document.getElementById('closeSettings'),
            saveSettings: document.getElementById('saveSettings'),
            gasUrlInput: document.getElementById('gasUrlInput'),
            apiKeyInput: document.getElementById('apiKeyInput')
        };

        let recognition = null;
        let isRecording = false;

        // Load Settings on Start
        window.addEventListener('DOMContentLoaded', () => {
            DOM.gasUrlInput.value = localStorage.getItem('gas_api_url') || "https://script.google.com/macros/s/AKfycbxNeTB5l5BM_WpKhlGLKojSMPIiR1BtoOloT8IH-c5f8QynoMC0kfaCxVRRkgS2sPq4/exec";
            DOM.apiKeyInput.value = localStorage.getItem('gemini_api_key') || "";
        });

        // Settings Modal Logic
        DOM.settingsBtn.addEventListener('click', () => DOM.settingsModal.classList.remove('hidden'));
        DOM.closeSettings.addEventListener('click', () => DOM.settingsModal.classList.add('hidden'));
        DOM.saveSettings.addEventListener('click', () => {
            localStorage.setItem('gas_api_url', DOM.gasUrlInput.value.trim());
            localStorage.setItem('gemini_api_key', DOM.apiKeyInput.value.trim());
            DOM.settingsModal.classList.add('hidden');
            alert("บันทึกการตั้งค่าแล้ว");
        });

        // 1. Setup Real-time Recording
        function setupRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return null;

            const rec = new SpeechRecognition();
            rec.continuous = true;
            rec.interimResults = true;

            rec.onstart = () => { isRecording = true; updateUI(true); };
            rec.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        DOM.finalText.value += event.results[i][0].transcript + ' ';
                        DOM.finalText.scrollTop = DOM.finalText.scrollHeight;
                        DOM.confidence.innerText = `Acc: ${Math.round(event.results[i][0].confidence * 100)}%`;
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                DOM.interimText.innerText = interim;
            };
            rec.onerror = () => { isRecording = false; updateUI(false); };
            rec.onend = () => { if (isRecording) try { rec.start(); } catch(e) {} else updateUI(false); };
            return rec;
        }

        function updateUI(active) {
            if (active) {
                DOM.recordBtn.classList.replace('bg-indigo-600', 'bg-red-500');
                DOM.recordIcon.classList.add('animate-pulse');
                DOM.recordText.innerText = "หยุดบันทึก";
                DOM.liveIcon.classList.remove('hidden');
            } else {
                DOM.recordBtn.classList.replace('bg-red-500', 'bg-indigo-600');
                DOM.recordIcon.classList.remove('animate-pulse');
                DOM.recordText.innerText = "เริ่มบันทึกสด";
                DOM.liveIcon.classList.add('hidden');
                DOM.interimText.innerText = "";
            }
        }

        DOM.recordBtn.addEventListener('click', () => {
            if (!recognition) recognition = setupRecognition();
            if (isRecording) { isRecording = false; recognition.stop(); } 
            else { recognition.lang = DOM.lang.value; recognition.start(); }
        });

        // 2. Handle File Upload (Transcribe with Gemini)
        DOM.uploadBtn.addEventListener('click', () => {
            if (!localStorage.getItem('gemini_api_key')) {
                alert("กรุณาตั้งค่า Gemini API Key ก่อนใช้งานถอดความจากไฟล์");
                DOM.settingsModal.classList.remove('hidden');
                return;
            }
            DOM.fileInput.click();
        });

        DOM.fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            DOM.interimText.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> กำลังวิเคราะห์ไฟล์เสียง...`;
            DOM.uploadBtn.disabled = true;

            try {
                const reader = new FileReader();
                reader.onload = async () => {
                    const base64Data = reader.result.split(',')[1];
                    await transcribeFile(base64Data, file.type);
                };
                reader.readAsDataURL(file);
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการอ่านไฟล์");
                DOM.interimText.innerText = "";
            }
        });

        async function transcribeFile(base64, mimeType) {
            const key = localStorage.getItem('gemini_api_key');
            const prompt = `Transcribe this audio file accurately in ${DOM.lang.options[DOM.lang.selectedIndex].text}. Provide only the transcription text.`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: mimeType, data: base64 } }
                            ]
                        }]
                    })
                });

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;

                if (text) {
                    DOM.finalText.value += "\n\n--- [ถอดความจากไฟล์] ---\n" + text + "\n";
                    DOM.finalText.scrollTop = DOM.finalText.scrollHeight;
                    DOM.interimText.innerText = "ถอดความเสร็จสิ้น";
                } else {
                    throw new Error("No transcription result");
                }
            } catch (err) {
                console.error(err);
                alert("ไม่สามารถถอดความได้ ตรวจสอบ API Key หรือความยาวไฟล์");
                DOM.interimText.innerText = "";
            } finally {
                DOM.uploadBtn.disabled = false;
                DOM.fileInput.value = "";
            }
        }

        // 3. Utils (Clear, Translate, Save)
        DOM.clearBtn.addEventListener('click', () => {
            if (confirm('ล้างหน้าจอ?')) { DOM.finalText.value = ''; DOM.interimText.innerText = ''; DOM.translateResult.innerText = ''; }
        });

        DOM.translateBtn.addEventListener('click', async () => {
            const text = DOM.finalText.value.trim();
            if (!text) return;
            DOM.translateBtn.disabled = true;
            DOM.translateResult.innerText = "กำลังประมวลผลการแปล...";
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${DOM.translateLang.value}&dt=t&q=${encodeURIComponent(text)}`;
                const res = await fetch(url);
                const data = await res.json();
                DOM.translateResult.innerText = data[0].map(s => s[0]).join('');
            } finally { DOM.translateBtn.disabled = false; }
        });

        DOM.saveBtn.addEventListener('click', () => {
            const text = DOM.finalText.value.trim();
            const url = localStorage.getItem('gas_api_url');
            if (!text) return alert("ไม่มีข้อความให้บันทึก");
            if (!url) {
                alert("กรุณาตั้งค่า Google Apps Script URL ก่อน");
                DOM.settingsModal.classList.remove('hidden');
                return;
            }
            DOM.saveBtn.disabled = true;
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ text: text, lang: DOM.lang.options[DOM.lang.selectedIndex].text })
            })
            .then(r => r.json())
            .then(d => { if (d.success) { alert("บันทึกลง Google Sheet สำเร็จ!");
                                         downloadTxt(text);
                                        }})
            .catch(() => alert("บันทึกล้มเหลว ตรวจสอบ URL"))
            .finally(() => DOM.saveBtn.disabled = false);
        });
        function downloadTxt(text) {
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Speech_${new Date().getTime()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

    </script>
</body>
</html>
