<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech to Text Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
    </style>
</head>
<body class="bg-gray-100 h-screen font-sans flex flex-col items-center p-2 sm:p-4 overflow-hidden">

    <!-- ========================================== -->
    <!-- 1. ตั้งค่า URL ของ Google Apps Script ตรงนี้ -->
    <!-- ========================================== -->
    <script>
        // วางลิงก์ Web App ของคุณที่ลงท้ายด้วย /exec ภายในเครื่องหมายคำพูดด้านล่าง
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxNeTB5l5BM_WpKhlGLKojSMPIiR1BtoOloT8IH-c5f8QynoMC0kfaCxVRRkgS2sPq4/exec";
    </script>

    <div class="max-w-2xl w-full h-full flex flex-col gap-3">
        
        <!-- Header (ย่อขนาดลง) -->
        <header class="gradient-bg text-white p-3 rounded-2xl shadow-sm z-10 shrink-0 flex items-center justify-center">
            <h1 class="text-lg font-bold"><i class="fas fa-microphone-alt mr-2"></i>Speech to Text Pro</h1>
        </header>

        <!-- Main Content (กล่องฟังเสียง) -->
        <main class="flex-grow flex flex-col bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden relative">
            
            <!-- แถบด้านบน: เลือกภาษาต้นทาง & ปุ่มล้าง -->
            <div class="flex justify-between items-center p-2 border-b border-gray-100 bg-gray-50 shrink-0">
                <div class="flex items-center gap-2">
                    <span id="statusIndicator" class="text-xs font-bold text-gray-500 flex items-center gap-1.5 ml-1">
                        <i id="statusIcon" class="fas fa-circle text-gray-300"></i>
                        <span id="statusText">รอการใช้งาน</span>
                    </span>
                    <select id="langSelect" class="bg-white border border-gray-200 text-gray-700 text-sm rounded-lg py-1 px-2 focus:outline-none focus:ring-1 focus:ring-indigo-500 ml-2">
                        <option value="th-TH">พูด: ไทย</option>
                        <option value="en-US">พูด: English</option>
                        <option value="ja-JP">พูด: 日本語</option>
                        <option value="zh-CN">พูด: 中文</option>
                    </select>
                </div>
                <button id="clearBtn" class="text-xs text-red-500 hover:text-red-700 font-bold px-3 py-1.5 bg-red-50 rounded-lg transition-colors">
                    <i class="fas fa-trash mr-1"></i> ล้าง
                </button>
            </div>
            
            <!-- พื้นที่แสดงข้อความ (อ่านอย่างเดียว เลื่อนได้ เต็มจอ) -->
            <div id="finalText" class="flex-grow p-4 text-gray-800 text-lg md:text-xl overflow-y-auto whitespace-pre-wrap leading-relaxed"></div>
            
            <!-- ข้อความชั่วคราว -->
            <div id="interimText" class="p-2 text-indigo-400 italic text-sm min-h-[2.5rem] bg-indigo-50/50 border-t border-gray-100 shrink-0"></div>
            
            <!-- ปุ่มควบคุมหลัก -->
            <div class="p-3 bg-white border-t border-gray-100 flex gap-2 shrink-0">
                <button id="recordBtn" class="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 active:scale-95">
                    <i id="recordIcon" class="fas fa-microphone text-lg"></i>
                    <span id="recordText">เริ่มพูด</span>
                </button>
                <button id="saveBtn" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 active:scale-95">
                    <i class="fas fa-save text-lg"></i>
                    <span>บันทึกลงชีท</span>
                </button>
            </div>
        </main>

        <!-- Translation Content (กล่องแปลภาษาด้านล่าง) -->
        <div class="h-1/3 min-h-[200px] flex flex-col bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden shrink-0">
            <!-- แถบเครื่องมือแปลภาษา -->
            <div class="flex justify-between items-center p-2 border-b border-gray-100 bg-amber-50 shrink-0">
                <div class="flex items-center gap-2 w-full max-w-[70%]">
                    <i class="fas fa-language text-amber-600 ml-2 text-lg"></i>
                    <select id="translateLangSelect" class="w-full bg-white border border-amber-200 text-gray-700 text-sm rounded-lg py-1.5 px-2 focus:outline-none focus:ring-1 focus:ring-amber-500 font-medium">
                        <option value="en">แปลเป็น: English</option>
                        <option value="th">แปลเป็น: ภาษาไทย</option>
                        <option value="ja">แปลเป็น: 日本語 (Japanese)</option>
                        <option value="zh-CN">แปลเป็น: 中文 (Chinese)</option>
                        <option value="ko">แปลเป็น: 한국어 (Korean)</option>
                    </select>
                </div>
                <button id="translateBtn" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-1.5 px-4 rounded-lg shadow transition-all active:scale-95 flex items-center gap-2 whitespace-nowrap">
                    <i class="fas fa-magic"></i> แปล
                </button>
            </div>
            
            <!-- พื้นที่แสดงผลการแปล -->
            <div id="translateResult" class="flex-grow p-4 text-gray-800 text-lg md:text-xl overflow-y-auto whitespace-pre-wrap leading-relaxed bg-amber-50/20"></div>
        </div>
    </div>

    <!-- Script Logic -->
    <script>
        const DOM = {
            lang: document.getElementById('langSelect'),
            finalText: document.getElementById('finalText'),
            interimText: document.getElementById('interimText'),
            recordBtn: document.getElementById('recordBtn'),
            recordIcon: document.getElementById('recordIcon'),
            recordText: document.getElementById('recordText'),
            statusIcon: document.getElementById('statusIcon'),
            statusText: document.getElementById('statusText'),
            clearBtn: document.getElementById('clearBtn'),
            saveBtn: document.getElementById('saveBtn'),
            
            // Translation
            translateLang: document.getElementById('translateLangSelect'),
            translateBtn: document.getElementById('translateBtn'),
            translateResult: document.getElementById('translateResult')
        };

        let recognition = null;
        let isRecording = false;
        let finalTranscriptStr = ""; // เก็บข้อความทั้งหมดไว้ในตัวแปรนี้

        function initRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("เบราว์เซอร์ไม่รองรับการแปลงเสียง กรุณาใช้ Chrome หรือ Safari");
                return null;
            }

            const rec = new SpeechRecognition();
            rec.continuous = true;
            rec.interimResults = true;

            rec.onstart = () => {
                isRecording = true;
                updateUI(true);
            };

            rec.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscriptStr += event.results[i][0].transcript + ' ';
                        DOM.finalText.innerText = finalTranscriptStr;
                        // เลื่อนหน้าจอลงล่างสุด
                        DOM.finalText.scrollTop = DOM.finalText.scrollHeight;
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                DOM.interimText.innerText = interim;
            };

            rec.onerror = (event) => {
                console.error("Speech Error:", event.error);
                isRecording = false;
                updateUI(false);
                if (event.error === 'not-allowed') {
                    alert("กรุณาอนุญาตการเข้าถึงไมโครโฟนในเบราว์เซอร์ของคุณ");
                }
            };

            rec.onend = () => {
                if (isRecording) {
                    try { rec.start(); } catch(e) {}
                } else {
                    updateUI(false);
                }
            };

            return rec;
        }

        function updateUI(isListening) {
            if (isListening) {
                DOM.recordBtn.className = "flex-[2] bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 active:scale-95";
                DOM.recordIcon.className = "fas fa-stop text-lg animate-pulse";
                DOM.recordText.innerText = "หยุดพูด";
                DOM.statusIcon.className = "fas fa-circle text-red-500 animate-pulse";
                DOM.statusText.innerText = "กำลังฟัง...";
                DOM.statusText.className = "text-red-500 font-bold";
            } else {
                DOM.recordBtn.className = "flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 active:scale-95";
                DOM.recordIcon.className = "fas fa-microphone text-lg";
                DOM.recordText.innerText = "เริ่มพูด";
                DOM.statusIcon.className = "fas fa-circle text-gray-300";
                DOM.statusText.innerText = "หยุดชั่วคราว";
                DOM.statusText.className = "text-gray-500";
                DOM.interimText.innerText = "";
            }
        }

        DOM.recordBtn.addEventListener('click', () => {
            if (!recognition) recognition = initRecognition();
            if (!recognition) return;

            if (isRecording) {
                isRecording = false;
                recognition.stop();
            } else {
                recognition.lang = DOM.lang.value;
                try {
                    recognition.start();
                } catch(e) {
                    console.warn("ระบบไมค์กำลังทำงานอยู่ หรือถูกขัดจังหวะ: ", e);
                }
            }
        });

        DOM.clearBtn.addEventListener('click', () => {
            if(confirm('ต้องการล้างข้อความทั้งหมดหรือไม่?')) {
                finalTranscriptStr = '';
                DOM.finalText.innerText = '';
                DOM.interimText.innerText = '';
                DOM.translateResult.innerText = '';
            }
        });

        // ==========================================
        // ระบบแปลภาษา (Google Translate API Free)
        // ==========================================
        DOM.translateBtn.addEventListener('click', async () => {
            const textToTranslate = finalTranscriptStr.trim();
            if (!textToTranslate) {
                alert("ไม่มีข้อความให้แปลครับ กรุณาพูดก่อน");
                return;
            }

            const targetLang = DOM.translateLang.value;
            const originalBtnHtml = DOM.translateBtn.innerHTML;
            
            // เปลี่ยนสถานะปุ่ม
            DOM.translateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> รอ..';
            DOM.translateBtn.disabled = true;
            DOM.translateResult.innerText = "กำลังแปลภาษา...";

            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(textToTranslate)}`;
                const response = await fetch(url);
                const data = await response.json();
                
                // นำข้อความที่แปลแล้วมาต่อกัน
                const translatedText = data[0].map(segment => segment[0]).join('');
                DOM.translateResult.innerText = translatedText;
            } catch (error) {
                console.error("Translation Error:", error);
                DOM.translateResult.innerText = "❌ เกิดข้อผิดพลาดในการแปลภาษา โปรดตรวจสอบการเชื่อมต่ออินเทอร์เน็ต";
            } finally {
                // คืนค่าปุ่ม
                DOM.translateBtn.innerHTML = originalBtnHtml;
                DOM.translateBtn.disabled = false;
            }
        });

        // ==========================================
        // ระบบบันทึกลง Google Sheet
        // ==========================================
        DOM.saveBtn.addEventListener('click', () => {
            const textToSave = finalTranscriptStr.trim();
            const langText = DOM.lang.options[DOM.lang.selectedIndex].text;

            if (!textToSave) return alert("ไม่มีข้อความให้บันทึกครับ");
            if (!GAS_API_URL || GAS_API_URL.includes("ใส่_URL")) return alert("กรุณานำ URL ของ Apps Script มาใส่ในโค้ดบรรทัดที่ 12 ก่อนครับ");

            if(isRecording) {
                isRecording = false;
                recognition.stop();
            }

            const oldText = DOM.saveBtn.innerHTML;
            DOM.saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังส่ง...';
            DOM.saveBtn.disabled = true;

            // ส่งข้อมูลผ่าน API (Fetch) ไปที่ Google Apps Script
            fetch(GAS_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ text: textToSave, lang: langText })
            })
            .then(response => response.json())
            .then(data => {
                DOM.saveBtn.innerHTML = oldText;
                DOM.saveBtn.disabled = false;
                if(data.success) {
                    alert("✅ บันทึกลง Sheet สำเร็จ! กำลังโหลดไฟล์ .txt");
                    downloadTxt(textToSave);
                } else {
                    alert("❌ ข้อผิดพลาดจากฝั่งเซิร์ฟเวอร์: " + data.message);
                }
            })
            .catch(error => {
                DOM.saveBtn.innerHTML = oldText;
                DOM.saveBtn.disabled = false;
                alert("❌ การเชื่อมต่อล้มเหลว ตรวจสอบว่า URL Apps Script ถูกต้องและลงท้ายด้วย /exec");
                console.error(error);
            });
        });

        function downloadTxt(text) {
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Speech_${new Date().getTime()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
