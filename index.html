<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech to Text Pro - Meeting Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        /* ปรับปรุง Scrollbar ให้ดูสะอาดตา */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col items-center p-0 sm:p-4 w-full overflow-x-hidden">

    <!-- ========================================== -->
    <!-- 1. ตั้งค่า URL ของ Google Apps Script ตรงนี้ -->
    <!-- ========================================== -->
    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxNeTB5l5BM_WpKhlGLKojSMPIiR1BtoOloT8IH-c5f8QynoMC0kfaCxVRRkgS2sPq4/exec";
    </script>

    <div class="max-w-2xl w-full flex flex-col gap-4 pb-10">
        
        <!-- Main Content (กล่องฟังเสียง) -->
        <main class="flex flex-col bg-white sm:rounded-3xl shadow-lg sm:border border-gray-200 overflow-hidden relative h-[90vh] sm:h-[85vh] shrink-0 w-full">
            
            <!-- Header (กะทัดรัดขึ้น) -->
            <header class="gradient-bg text-white p-3 shadow-md z-10 shrink-0 flex items-center justify-between px-4">
                <h1 class="text-sm font-bold flex items-center gap-2">
                    <i class="fas fa-podcast text-red-400 animate-pulse hidden" id="liveIcon"></i>
                    Meeting Recorder Pro
                </h1>
                <div id="confidenceIndicator" class="text-[10px] bg-white/20 px-2 py-0.5 rounded-full">ความแม่นยำ: -</div>
            </header>
            
            <!-- แถบด้านบน: เครื่องมือ -->
            <div class="flex justify-between items-center p-2 border-b border-gray-100 bg-gray-50 shrink-0">
                <div class="flex items-center gap-1.5">
                    <select id="langSelect" class="bg-white border border-gray-200 text-gray-700 text-xs rounded-lg py-1 px-2 focus:ring-1 focus:ring-indigo-500 outline-none">
                        <option value="th-TH">ภาษาไทย (TH)</option>
                        <option value="en-US">English (US)</option>
                        <option value="ja-JP">日本語 (JP)</option>
                        <option value="zh-CN">中文 (CN)</option>
                    </select>
                    <span id="statusText" class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter ml-1">OFFLINE</span>
                </div>
                <div class="flex gap-2">
                    <button id="clearBtn" class="text-[11px] text-red-500 font-bold px-3 py-1.5 hover:bg-red-50 rounded-lg transition-all">
                        <i class="fas fa-trash-alt"></i> ล้างหน้าจอ
                    </button>
                </div>
            </div>
            
            <!-- พื้นที่แสดงข้อความ (แก้ไขได้) -->
            <textarea id="finalText" class="flex-grow w-full p-5 text-gray-800 text-lg overflow-y-auto whitespace-pre-wrap leading-relaxed resize-none focus:outline-none bg-transparent" placeholder="ระบบกำลังรอรับเสียงบรรยายในห้องประชุม... (กรุณาวางอุปกรณ์ไว้ใกล้ลำโพงหรือผู้พูดเพื่อให้ผลลัพธ์ดีที่สุด)"></textarea>
            
            <!-- ข้อความชั่วคราว (Interim) -->
            <div id="interimText" class="px-5 py-3 text-indigo-500 font-medium italic text-sm min-h-[3rem] bg-indigo-50/30 border-t border-gray-50 shrink-0 flex items-center"></div>
            
            <!-- ปุ่มควบคุมหลัก -->
            <div class="p-3 bg-white border-t border-gray-100 flex gap-2 shrink-0">
                <button id="recordBtn" class="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-2xl shadow-md transition-all flex items-center justify-center gap-2 active:scale-95">
                    <i id="recordIcon" class="fas fa-microphone"></i>
                    <span id="recordText" class="text-sm">เริ่มบันทึก</span>
                </button>
                <button id="saveBtn" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-2xl shadow-md transition-all flex items-center justify-center gap-2 active:scale-95">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span class="text-sm">Save</span>
                </button>
            </div>
        </main>

        <!-- Translation Card (เลื่อนลงมา) -->
        <div class="flex flex-col bg-white sm:rounded-3xl shadow-lg border-t border-gray-200 overflow-hidden min-h-[450px] shrink-0 w-full mb-10">
            <div class="flex justify-between items-center p-4 border-b border-gray-100 bg-amber-50 shrink-0">
                <div class="flex items-center gap-3 w-full max-w-[70%]">
                    <div class="bg-amber-100 p-2 rounded-lg text-amber-600">
                        <i class="fas fa-language text-xl"></i>
                    </div>
                    <select id="translateLangSelect" class="w-full bg-white border border-amber-200 text-gray-700 text-sm rounded-xl py-2 px-3 focus:ring-2 focus:ring-amber-500 outline-none font-medium">
                        <option value="en">แปลสรุปเป็น: English</option>
                        <option value="th">แปลสรุปเป็น: ภาษาไทย</option>
                        <option value="ja">แปลสรุปเป็น: Japanese</option>
                        <option value="zh-CN">แปลสรุปเป็น: Chinese</option>
                    </select>
                </div>
                <button id="translateBtn" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 px-6 rounded-xl shadow-lg transition-all active:scale-95 flex items-center gap-2 text-sm">
                    <i class="fas fa-bolt"></i> แปลทันที
                </button>
            </div>
            <div id="translateResult" class="flex-grow p-6 text-gray-800 text-lg overflow-y-auto whitespace-pre-wrap leading-relaxed bg-amber-50/10" placeholder="คำแปลจะปรากฏที่นี่หลังจากกดปุ่มแปล..."></div>
        </div>
    </div>

    <script>
        const DOM = {
            lang: document.getElementById('langSelect'),
            finalText: document.getElementById('finalText'),
            interimText: document.getElementById('interimText'),
            recordBtn: document.getElementById('recordBtn'),
            recordIcon: document.getElementById('recordIcon'),
            recordText: document.getElementById('recordText'),
            statusText: document.getElementById('statusText'),
            liveIcon: document.getElementById('liveIcon'),
            clearBtn: document.getElementById('clearBtn'),
            saveBtn: document.getElementById('saveBtn'),
            confidence: document.getElementById('confidenceIndicator'),
            translateLang: document.getElementById('translateLangSelect'),
            translateBtn: document.getElementById('translateBtn'),
            translateResult: document.getElementById('translateResult')
        };

        let recognition = null;
        let isRecording = false;
        let ignoreNextEnd = false;
        let historyText = ""; // เก็บข้อความที่ยืนยันแล้วในอดีต

        function setupRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("เบราว์เซอร์ไม่รองรับ Speech Recognition ครับ");
                return null;
            }

            const rec = new SpeechRecognition();
            rec.continuous = true;
            rec.interimResults = true;
            rec.maxAlternatives = 1;

            rec.onstart = () => {
                isRecording = true;
                updateUI(true);
            };

            rec.onresult = (event) => {
                let interimTranscript = '';
                let currentSessionFinal = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        currentSessionFinal += transcript + ' ';
                        // แสดงความแม่นยำ
                        const conf = Math.round(event.results[i][0].confidence * 100);
                        DOM.confidence.innerText = `ความแม่นยำ: ${conf}%`;
                    } else {
                        interimTranscript += transcript;
                    }
                }

                if (currentSessionFinal) {
                    // ป้องกันการเบิ้ล: ถ้าข้อความใหม่เหมือนกับข้อความล่าสุดใน textarea ให้ข้ามไป
                    const currentVal = DOM.finalText.value;
                    if (!currentVal.endsWith(currentSessionFinal)) {
                        DOM.finalText.value += currentSessionFinal;
                        DOM.finalText.scrollTop = DOM.finalText.scrollHeight;
                    }
                }
                DOM.interimText.innerText = interimTranscript;
            };

            rec.onerror = (event) => {
                console.error("Speech Error:", event.error);
                if (event.error === 'no-speech') return; // เงียบเฉยๆ ไม่ต้องปิด
                if (event.error === 'not-allowed') alert("กรุณาเปิดไมโครโฟนด้วยครับ");
                
                isRecording = false;
                updateUI(false);
            };

            rec.onend = () => {
                if (isRecording) {
                    // หากยังต้องการบันทึกอยู่ (เช่น หยุดเพราะเงียบนานเกินไป) ให้เริ่มใหม่แบบเงียบๆ
                    try { rec.start(); } catch(e) {}
                } else {
                    updateUI(false);
                }
            };

            return rec;
        }

        function updateUI(active) {
            if (active) {
                DOM.recordBtn.classList.replace('bg-indigo-600', 'bg-red-500');
                DOM.recordIcon.classList.add('animate-pulse');
                DOM.recordText.innerText = "หยุดบันทึก";
                DOM.statusText.innerText = "LIVE / RECORDING";
                DOM.statusText.classList.replace('text-gray-400', 'text-red-500');
                DOM.liveIcon.classList.remove('hidden');
            } else {
                DOM.recordBtn.classList.replace('bg-red-500', 'bg-indigo-600');
                DOM.recordIcon.classList.remove('animate-pulse');
                DOM.recordText.innerText = "เริ่มบันทึก";
                DOM.statusText.innerText = "OFFLINE / IDLE";
                DOM.statusText.classList.replace('text-red-500', 'text-gray-400');
                DOM.liveIcon.classList.add('hidden');
                DOM.interimText.innerText = "";
            }
        }

        DOM.recordBtn.addEventListener('click', () => {
            if (!recognition) recognition = setupRecognition();
            if (!recognition) return;

            if (isRecording) {
                isRecording = false;
                recognition.stop();
            } else {
                recognition.lang = DOM.lang.value;
                try {
                    recognition.start();
                } catch(e) {
                    console.warn("Recognition already started");
                }
            }
        });

        DOM.clearBtn.addEventListener('click', () => {
            if (confirm('ยืนยันการล้างข้อความทั้งหมดหรือไม่?')) {
                DOM.finalText.value = '';
                DOM.interimText.innerText = '';
                DOM.translateResult.innerText = '';
            }
        });

        DOM.translateBtn.addEventListener('click', async () => {
            const text = DOM.finalText.value.trim();
            if (!text) return alert("ยังไม่มีเนื้อหาการประชุมให้แปลครับ");

            const originalBtn = DOM.translateBtn.innerHTML;
            DOM.translateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังสรุป..';
            DOM.translateBtn.disabled = true;

            try {
                const target = DOM.translateLang.value;
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;
                const res = await fetch(url);
                const data = await res.json();
                const translated = data[0].map(s => s[0]).join('');
                DOM.translateResult.innerText = translated;
            } catch (e) {
                alert("การแปลขัดข้อง กรุณาลองอีกครั้ง");
            } finally {
                DOM.translateBtn.innerHTML = originalBtn;
                DOM.translateBtn.disabled = false;
            }
        });

        DOM.saveBtn.addEventListener('click', () => {
            const text = DOM.finalText.value.trim();
            if (!text) return alert("ไม่มีข้อความให้บันทึก");
            if (GAS_API_URL.includes("ใส่_URL")) return alert("กรุณาติดตั้ง Apps Script URL ก่อนครับ");

            const originalBtn = DOM.saveBtn.innerHTML;
            DOM.saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ส่งข้อมูล..';
            DOM.saveBtn.disabled = true;

            fetch(GAS_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ text: text, lang: DOM.lang.options[DOM.lang.selectedIndex].text })
            })
            .then(r => r.json())
            .then(d => {
                if (d.success) alert("บันทึกลง Google Sheet สำเร็จ!");
                else alert("เกิดข้อผิดพลาด: " + d.message);
            })
            .catch(e => alert("เชื่อมต่อ Server ไม่ได้ ตรวจสอบ URL /exec อีกครั้ง"))
            .finally(() => {
                DOM.saveBtn.innerHTML = originalBtn;
                DOM.saveBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
